<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Wisdom Hub</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #58a6ff; margin-bottom: 1.5rem; }
        .stat-item { font-size: 1.2rem; margin: 0.5rem 0; color: #8b949e; }
        .stat-value { color: #f0883e; font-weight: bold; font-family: monospace; }
        .footer { margin-top: 2rem; font-size: 0.8rem; color: #484f58; }
        button { background: #238636; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔮 Oracle Stats</h1>
        <div id="stats">
            <p>Connecting to External Brain...</p>
        </div>
        <br>
        <button onclick="fetchStats()">Refresh Knowledge</button>
    </div>
    <div class="footer">Powered by Gemini CLI & Oracle MAW</div>

    <script>
        async function fetchStats() {
            const display = document.getElementById('stats');
            try {
                const res = await fetch('http://localhost:47778/api/stats');
                const data = await res.json();
                display.innerHTML = `
                    <div class="stat-item">Total Documents: <span class="stat-value">${data.total_documents || 0}</span></div>
                    <div class="stat-item">Total Chunks: <span class="stat-value">${data.total_chunks || 0}</span></div>
                    <div class="stat-item">Last Index: <span class="stat-value">${new Date().toLocaleTimeString()}</span></div>
                `;
            } catch (err) {
                display.innerHTML = '<p style="color: #f85149;">API Offline or Connection Refused</p>';
            }
        }
        fetchStats();
    </script>
</body>
</html>
