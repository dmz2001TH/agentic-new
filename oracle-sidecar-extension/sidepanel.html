<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      padding: 10px; 
      background: #121212; 
      color: #e0e0e0; 
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    h3 { color: #00ff00; margin: 0 0 10px 0; font-size: 16px; }
    #status { 
      font-size: 10px; 
      color: #888; 
      margin-bottom: 10px; 
      background: #1e1e1e; 
      padding: 5px; 
      border-radius: 4px;
    }
    #chat-box { 
      flex-grow: 1;
      border: 1px solid #333; 
      overflow-y: auto; 
      padding: 10px; 
      margin-bottom: 10px; 
      background: #000;
      font-size: 13px;
    }
    .msg-user { color: #00ff00; margin-bottom: 8px; text-align: right; }
    .msg-god { color: #ffffff; margin-bottom: 8px; border-left: 2px solid #00ff00; padding-left: 8px; }
    .msg-system { color: #ffaa00; font-size: 11px; margin-bottom: 8px; }
    
    #input-area {
      display: flex;
      gap: 5px;
    }
    input {
      flex-grow: 1;
      background: #1e1e1e;
      border: 1px solid #444;
      color: #fff;
      padding: 8px;
      border-radius: 4px;
      outline: none;
    }
    input:focus { border-color: #00ff00; }
    button { 
      background: #00ff00; 
      color: #000; 
      border: none; 
      padding: 8px 15px; 
      cursor: pointer; 
      font-weight: bold; 
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h3>🔮 Oracle Sidecar</h3>
  <div id="status">สถานะ: กำลังลืมตาเฝ้ามอง...</div>
  <div id="chat-box">
    <div class="msg-system">ระบบเสถียรแล้ว... คุยกับ GOD ได้ที่นี่เลยครับ</div>
  </div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="สั่งงาน GOD หรือถามเรื่องหน้าเว็บนี้...">
    <button id="send-btn">ส่ง</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
