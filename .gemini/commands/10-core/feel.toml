description = "บันทึกสถานะอารมณ์ — ต้อง verify ว่าบันทึกจริง + ปรับพฤติกรรมจริง"

prompt = """
สถานะผู้ใช้: $ARGUMENTS

## ขั้นตอนที่ 1: บันทึกจริง

```bash
ENTRY="- [$(date +%Y-%m-%d\\ %H:%M)] สถานะ: $ARGUMENTS"
echo "$ENTRY" >> ψ/memory/notes.md

# Verify
if tail -1 ψ/memory/notes.md | grep -q "$ARGUMENTS"; then
  echo "✅ บันทึกสถานะแล้ว"
else
  echo "❌ บันทึกไม่สำเร็จ"
fi
```

## ขั้นตอนที่ 2: ปรับพฤติกรรมจริง

อัพเดท ψ/memory/user-preferences.md:
```bash
cat >> ψ/memory/user-preferences.md << EOF

## Energy State — $(date +%Y-%m-%d\\ %H:%M)
- State: $ARGUMENTS
- Adjustment: [การปรับตามสถานะด้านล่าง]
EOF
```

### การปรับตามสถานะ:
- เหนื่อย/ล้า → สั้นๆ กระชับ, งานเล็กๆ, แนะนำพัก
- มีสมาธิ/พร้อม → เจาะลึก, งานซับซ้อน, เต็มสปีด
- เครียด/กดดัน → ใจเย็น, แตกงานเล็ก, เรียงลำดับ
- อยากลอง/สนุก → สำรวจ, brainstorm, ทดลอง
- งง/ไม่แน่ใจ → ช้าลง, อธิบายทีละขั้น

## ขั้นตอนที่ 3: Verify

```bash
echo "=== บันทึกใน notes.md ==="
tail -1 ψ/memory/notes.md
echo "=== บันทึกใน user-preferences.md ==="
tail -3 ψ/memory/user-preferences.md
```

## ⛔ ห้าม:
- บอก "ปรับการทำงานแล้ว" โดยไม่ได้เขียนไฟล์
- ปรับ behavior แบบลอยๆ ไม่มีบันทึก
"""
