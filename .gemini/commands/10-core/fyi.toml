description = "บอกให้จำ — ต้อง verify ว่าบันทึกจริงในไฟล์จริง"

prompt = """
จดจำข้อมูลที่บอก

ข้อมูล: $ARGUMENTS

## ขั้นตอนที่ 1: วิเคราะห์

แยกประเภทข้อมูล:
- ข้อเท็จจริง → ψ/memory/notes.md
- ความชอบ → ψ/memory/values.md
- ข้อมูลคน → ψ/memory/people.md
- Insight → ψ/memory/learnings.md
- การตัดสินใจ → ψ/memory/decisions.md

## ขั้นตอนที่ 2: บันทึกจริง

```bash
TARGET_FILE="[ไฟล์ที่เลือก]"
ENTRY="- [$(date +%Y-%m-%d\\ %H:%M)] $ARGUMENTS"
echo "$ENTRY" >> "$TARGET_FILE"
echo "บันทึกแล้ว: $TARGET_FILE"
```

## ขั้นตอนที่ 3: Verify (บังคับ)

รันทุกครั้งหลังบันทึก:
```bash
# ตรวจว่าบันทึกจริง
if tail -3 "$TARGET_FILE" | grep -q "$ARGUMENTS"; then
  echo "✅ ยืนยัน: บันทึกใน $TARGET_FILE แล้วจริงๆ"
  # แสดงสิ่งที่บันทึก
  tail -1 "$TARGET_FILE"
else
  echo "❌ ผิดปกติ: ไม่พบข้อมูลที่บันทึก"
fi
```

## รายงาน:
```
✅ จำแล้ว → [ไฟล์]: [สิ่งที่บันทึกจริงๆ 1 บรรทัด]
📎 บรรทัดที่: [เลขบรรทัด]
```

## ⛔ ห้าม:
- บอก "จำแล้ว" ก่อน verify
- บอก "บันทึกใน X" ถ้าไม่ได้ echo ลงไฟล์จริง
- บันทึกแล้วไม่เช็คว่าเขียนสำเร็จ

ตอบเป็นภาษาไทย
"""
