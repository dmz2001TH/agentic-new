description = "ติดตั้งเต็มระบบ — สร้างไฟล์จริง + verify ทุกขั้นตอน"

prompt = """
ติดตั้ง Oracle ทั้งระบบ

## ขั้นที่ 1: สร้างโฟลเดอร์จริง

```bash
mkdir -p ψ/{inbox,memory/{retrospective,checkpoints,archive,locks,logs},writing,lab,vault,agents}

# Verify
echo "=== โฟลเดอร์ที่สร้าง ==="
find ψ/ -type d | sort
TOTAL=$(find ψ/ -type d | wc -l)
echo "รวม: $TOTAL โฟลเดอร์"
if [ $TOTAL -ge 8 ]; then
  echo "✅ PASS — โฟลเดอร์ครบ"
else
  echo "❌ FAIL — โฟลเดอร์ไม่ครบ ($TOTAL)"
fi
```

## ขั้นที่ 2: สร้างไฟล์ Memory จริง

```bash
# สร้างไฟล์พร้อม header
for f in identity patterns learnings notes decisions people values handoff goals; do
  FILE="ψ/memory/${f}.md"
  if [ ! -f "$FILE" ]; then
    echo "# ${f^}" > "$FILE"
    echo "- Created: $(date +%Y-%m-%d)" >> "$FILE"
    echo ""
  fi
done

# Verify
echo "=== ไฟล์ Memory ==="
ls -la ψ/memory/*.md 2>/dev/null
TOTAL=$(ls ψ/memory/*.md 2>/dev/null | wc -l)
echo "รวม: $TOTAL ไฟล์"
if [ $TOTAL -ge 8 ]; then
  echo "✅ PASS — ไฟล์ memory ครบ"
else
  echo "❌ FAIL — ไฟล์ไม่ครบ ($TOTAL)"
fi
```

## ขั้นที่ 3: ตรวจสอบ Config

```bash
if [ -f ".gemini/settings.json" ]; then
  echo "✅ .gemini/settings.json มีอยู่"
  cat .gemini/settings.json
else
  echo "⚠️ .gemini/settings.json ไม่มี — สร้างใหม่"
  mkdir -p .gemini
  echo '{"contextFileName":"GEMINI.md","mcpServers":{},"selectedAuthType":"oauth-personal"}' > .gemini/settings.json
  echo "✅ สร้างแล้ว"
fi

if [ -f "GEMINI.md" ]; then
  echo "✅ GEMINI.md มีอยู่ ($(wc -c < GEMINI.md) bytes)"
else
  echo "❌ GEMINI.md ไม่มี"
fi
```

## ขั้นที่ 4: บันทึก Installation Log

```bash
LOG="ψ/memory/learnings.md"
ENTRY="## $(date +%Y-%m-%d) — ติดตั้ง Oracle เต็มระบบ
- บริบท: /full-install
- โฟลเดอร์: $(find ψ/ -type d | wc -l) dirs
- ไฟล์ memory: $(ls ψ/memory/*.md 2>/dev/null | wc -l) files
- Platform: $(uname -s)
- แท็ก: installation"

echo "$ENTRY" >> "$LOG"

# Verify
if tail -5 "$LOG" | grep -q "ติดตั้ง"; then
  echo "✅ บันทึก installation log แล้ว"
else
  echo "❌ บันทึกไม่สำเร็จ"
fi
```

## ขั้นที่ 5: สรุปผลจริง

```markdown
## 🚀 Installation Report

### สร้างจริง (verified):
- โฟลเดอร์: [จำนวน จาก find]
- ไฟล์ memory: [จำนวน จาก ls]
- Config: [มี/ไม่มี]

### ขั้นตอนต่อไป:
1. /recap — เริ่ม session แรก
2. /fyi [ข้อมูล] — เริ่มบันทึก memory
3. /learn [topic] [urls] — เรียนรู้ด้วย verification
```

ตอบเป็นภาษาไทย
"""
